name: Vigía del monitor

on:
  schedule:
    - cron: "17 10-23,0-2 * * *"   # cada hora, de 07 a 23 hora argentina (UTC-3)
  workflow_dispatch: {}             # botón "Run workflow" para probarlo a mano

jobs:
  vigia:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-vigia.txt
      - name: Correr vigía
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vigia.py
